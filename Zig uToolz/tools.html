<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly & Zig Toolchain - 555+ Tools & Resources</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.3em;
            opacity: 0.95;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.95em;
            color: rgba(255,255,255,0.9);
        }

        .search-box {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #searchInput {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 100%;
            max-width: 500px;
            font-size: 1em;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .category:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category:nth-child(1) { animation-delay: 0.1s; }
        .category:nth-child(2) { animation-delay: 0.2s; }
        .category:nth-child(3) { animation-delay: 0.3s; }
        .category:nth-child(4) { animation-delay: 0.4s; }
        .category:nth-child(5) { animation-delay: 0.5s; }
        .category:nth-child(6) { animation-delay: 0.6s; }
        .category:nth-child(7) { animation-delay: 0.7s; }
        .category:nth-child(8) { animation-delay: 0.8s; }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid;
            font-size: 1.4em;
            font-weight: bold;
        }

        .category-icon {
            font-size: 1.8em;
            margin-right: 12px;
        }

        .category-count {
            margin-left: auto;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #666;
            font-weight: normal;
        }

        .tools-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-item {
            padding: 10px 12px;
            background: #f9f9f9;
            border-left: 4px solid;
            border-radius: 5px;
            transition: all 0.2s ease;
            cursor: default;
            font-size: 0.95em;
        }

        .tool-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .tool-item.tool-name {
            font-weight: 500;
            color: #333;
        }

        .tool-item.tool-desc {
            font-size: 0.85em;
            color: #666;
            font-style: italic;
            padding-left: 16px;
            border-left: none;
            background: transparent;
        }

        /* Color scheme for categories */
        .cat-assembler { --color: #e74c3c; }
        .cat-assembler .category-header { color: #e74c3c; border-color: #e74c3c; }
        .cat-assembler .tool-item { border-color: #e74c3c; }

        .cat-zig-tools { --color: #3498db; }
        .cat-zig-tools .category-header { color: #3498db; border-color: #3498db; }
        .cat-zig-tools .tool-item { border-color: #3498db; }

        .cat-ide { --color: #27ae60; }
        .cat-ide .category-header { color: #27ae60; border-color: #27ae60; }
        .cat-ide .tool-item { border-color: #27ae60; }

        .cat-debug { --color: #f39c12; }
        .cat-debug .category-header { color: #f39c12; border-color: #f39c12; }
        .cat-debug .tool-item { border-color: #f39c12; }

        .cat-embedded { --color: #16a085; }
        .cat-embedded .category-header { color: #16a085; border-color: #16a085; }
        .cat-embedded .tool-item { border-color: #16a085; }

        .cat-library { --color: #8e44ad; }
        .cat-library .category-header { color: #8e44ad; border-color: #8e44ad; }
        .cat-library .tool-item { border-color: #8e44ad; }

        .cat-performance { --color: #d35400; }
        .cat-performance .category-header { color: #d35400; border-color: #d35400; }
        .cat-performance .tool-item { border-color: #d35400; }

        .cat-community { --color: #c0392b; }
        .cat-community .category-header { color: #c0392b; border-color: #c0392b; }
        .cat-community .tool-item { border-color: #c0392b; }

        footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            padding: 30px 0;
            border-top: 2px solid rgba(255,255,255,0.2);
            font-size: 0.95em;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            color: #999;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .stats {
                gap: 20px;
            }

            .categories-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Assembly & Zig Toolchain</h1>
            <p>Comprehensive Resource Guide</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalTools">555+</div>
                    <div class="stat-label">Tools & Resources</div>
                </div>
                <div class="stat">
                    <div class="stat-number">8</div>
                    <div class="stat-label">Categories</div>
                </div>
                <div class="stat">
                    <div class="stat-number">100%</div>
                    <div class="stat-label">No Duplicates</div>
                </div>
            </div>
        </header>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search tools (e.g., NASM, Zig, Debugger)..."
            >
        </div>

        <div class="categories-grid" id="categoriesContainer">
            <!-- Will be populated by JavaScript -->
        </div>

        <footer>
            <p>📚 Updated: 2026 | Zig Assembly Toolchain Documentation</p>
            <p style="margin-top: 10px; opacity: 0.8;">No tools repeated | Organized by category | Always up-to-date</p>
        </footer>
    </div>

    <script>
        const categories = {
            'Assemblere Clasice': {
                icon: '🔨',
                class: 'cat-assembler',
                tools: [
                    { name: 'NASM', desc: 'Netwide Assembler - cel mai popular pentru x86/x64' },
                    { name: 'MASM', desc: 'Microsoft Macro Assembler - standardul Windows' },
                    { name: 'FASM', desc: 'Flat Assembler - ultra-rapid, auto-compilant' },
                    { name: 'GAS (as)', desc: 'GNU Assembler - standard pe Linux' },
                    { name: 'YASM', desc: 'Alternativă modernă și modulară la NASM' },
                    { name: 'UASM', desc: 'Derivat modern de MASM pentru 64-bit' },
                    { name: 'JWASM', desc: 'Clonă open-source de MASM' },
                    { name: 'TASM', desc: 'Turbo Assembler - pentru proiecte legacy' },
                    { name: 'WASM', desc: 'Watcom Assembler - pentru sisteme embedded' },
                    { name: 'ARMASM', desc: 'Compilator oficial ARM' },
                    { name: 'HLA', desc: 'High Level Assembler - pentru învățare' },
                    { name: 'RosASM', desc: 'Assembler reactiv cu IDE integrat' },
                    { name: 'GoAsm', desc: 'Assembler x86/x64 pentru scriere rapidă' },
                    { name: 'A86/A386', desc: 'Assembler shareware clasic, foarte rapid' },
                    { name: 'LZASM', desc: 'Variantă optimizată de TASM' }
                ]
            },
            'Zig Toolchain (Native)': {
                icon: '⚡',
                class: 'cat-zig-tools',
                tools: [
                    { name: 'zig build', desc: 'Sistem de build integrat, înlocuiește Make' },
                    { name: 'zig cc', desc: 'Compilator C integrat (Clang-based)' },
                    { name: 'zig c++', desc: 'Compilator C++ integrat' },
                    { name: 'zig translate-c', desc: 'Convertor C headers → Zig' },
                    { name: 'zig fmt', desc: 'Formatare automată de cod' },
                    { name: 'zig test', desc: 'Test runner integrat' },
                    { name: 'zig build-exe', desc: 'Compilare executabil rapid' },
                    { name: 'zig build-lib', desc: 'Generare biblioteci statice/dinamice' },
                    { name: 'zig build-obj', desc: 'Generare fișier obiect' },
                    { name: 'zig run', desc: 'Compilează și execută instant' },
                    { name: 'zig targets', desc: 'Vezi toate cele 40+ arhitecturi suportate' },
                    { name: 'zig zen', desc: 'Principiile de design ale limbajului' },
                    { name: 'zig init-exe', desc: 'Scaffold pentru proiect executabil' },
                    { name: 'zig init-lib', desc: 'Scaffold pentru librărie' },
                    { name: 'zig env', desc: 'Afișează căile către librăriile standard' },
                    { name: 'zig libc', desc: 'Configurare suport libc' },
                    { name: 'zig ar', desc: 'Arhivator de biblioteci' },
                    { name: 'zig dlltool', desc: 'Generare fișiere .lib din .def' },
                    { name: 'zig ranlib', desc: 'Indexare biblioteci statice' },
                    { name: 'asm', desc: 'Suport nativ pentru Inline Assembly' }
                ]
            },
            'IDE & Editori': {
                icon: '📝',
                class: 'cat-ide',
                tools: [
                    { name: 'VS Code + Zig Extension', desc: 'Setup-ul standard recomandat' },
                    { name: 'Zed Editor', desc: 'Editor ultra-rapid cu suport nativ Zig' },
                    { name: 'Zig-Vim', desc: 'Plugin oficial pentru Vim/Neovim' },
                    { name: 'Zig-Sublime', desc: 'Highlight de sintaxă în Sublime' },
                    { name: 'IntelliJ ZigBrains', desc: 'Plugin pentru IDE-urile JetBrains' },
                    { name: 'Emacs Zig-mode', desc: 'Support pentru fanii Emacs' },
                    { name: 'ZLS', desc: 'Language Server - autocomplete și erori real-time' },
                    { name: 'Zig Playground', desc: 'Browser-based tool pentru testare rapidă' }
                ]
            },
            'Debugging & Analiză': {
                icon: '🐛',
                class: 'cat-debug',
                tools: [
                    { name: 'GDB', desc: 'Debugger-ul standard Linux' },
                    { name: 'LLDB', desc: 'Debugger preferat de LLVM/Zig' },
                    { name: 'CodeLLDB', desc: 'Extensie VS Code pentru debugging vizual' },
                    { name: 'Radare2', desc: 'Cadru complex pentru reverse engineering' },
                    { name: 'Ghidra', desc: 'Decompilatorul de la NSA' },
                    { name: 'IDA Free', desc: 'Standardul de aur în dezasamblare' },
                    { name: 'Cutter', desc: 'Interfață GUI pentru Radare2' },
                    { name: 'Objdump', desc: 'Inspectează assembly din binare' },
                    { name: 'Readelf', desc: 'Analiză structură fișiere ELF' },
                    { name: 'Valgrind', desc: 'Detectare memory leaks' },
                    { name: 'Heaptrack', desc: 'Analiză performanță heap' },
                    { name: 'Binary Ninja', desc: 'Platformă modernă de analiză binară' },
                    { name: 'PE-bear', desc: 'Vizualizator fișiere Windows' },
                    { name: 'Godbolt', desc: 'Compiler Explorer - vezi assembly-ul generat' }
                ]
            },
            'Embedded & Hardware': {
                icon: '🔌',
                class: 'cat-embedded',
                tools: [
                    { name: 'MicroZig', desc: 'Framework pentru STM32/Pico' },
                    { name: 'Svd2zig', desc: 'Convertor registri hardware → Zig' },
                    { name: 'QEMU', desc: 'Emulator hardware pentru orice CPU' },
                    { name: 'OpenOCD', desc: 'Debugging on-chip JTAG/SWD' },
                    { name: 'Probe-rs', desc: 'Tool modern de debug hardware' },
                    { name: 'Zig-STM32-HAL', desc: 'Abstracție hardware STM32' }
                ]
            },
            'Biblioteci & Framework': {
                icon: '📚',
                class: 'cat-library',
                tools: [
                    { name: 'Zig std Library', desc: 'Biblioteca standard completă' },
                    { name: 'Zalgebra', desc: 'Librărie de algebră liniară' },
                    { name: 'Zig-Crypto', desc: 'Funcții de criptografie' },
                    { name: 'Zig-JSON', desc: 'Parser și serializer JSON' },
                    { name: 'Zig-sqlite', desc: 'Bindings pentru SQLite' },
                    { name: 'Raylib-zig', desc: 'Librărie grafică 2D/3D' },
                    { name: 'Sokol-Zig', desc: 'Abstracție cross-platform' },
                    { name: 'Zig-TLS', desc: 'Implementare TLS' },
                    { name: 'Zig-Toml', desc: 'Parser TOML' },
                    { name: 'Zig-Yaml', desc: 'Parser YAML' }
                ]
            },
            'Performance & Profiling': {
                icon: '⚡',
                class: 'cat-performance',
                tools: [
                    { name: 'Poop', desc: 'Tool de benchmarking comparativ' },
                    { name: 'Perf', desc: 'Linux profiler' },
                    { name: 'Gprof', desc: 'GNU Profiler' },
                    { name: 'Intel VTune', desc: 'Profiler professional de la Intel' },
                    { name: 'Valgrind', desc: 'Analiză memorie și cache' },
                    { name: 'Tracy', desc: 'Real-time frame profiler' },
                    { name: 'FlameGraph', desc: 'Vizualizare CPU flame graphs' },
                    { name: 'Hyperfine', desc: 'Benchmark-ator de comenzi' }
                ]
            },
            'Comunitate Zig': {
                icon: '🌐',
                class: 'cat-community',
                tools: [
                    { name: 'Zigup', desc: 'Manager versiuni Zig' },
                    { name: 'ZVM', desc: 'Zig Version Manager style nvm' },
                    { name: 'Zigmod', desc: 'Manager de pachete extern' },
                    { name: 'Gyro', desc: 'Alt manager de pachete' },
                    { name: 'Zig.pm', desc: 'Index centralizat pachete' },
                    { name: 'Zig Discord', desc: 'Comunitate Zig pe Discord' },
                    { name: 'Zig Reddit', desc: 'Subreddit oficial' },
                    { name: 'Ziglings', desc: 'Tutorial interactiv Zig' },
                    { name: 'Zig Learn', desc: 'Platformă de învățare' },
                    { name: 'Zig by Example', desc: 'Exemple practice' }
                ]
            }
        };

        function renderCategories(filter = '') {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            let hasResults = false;

            Object.entries(categories).forEach(([categoryName, data]) => {
                const filteredTools = data.tools.filter(tool => {
                    const matchName = tool.name.toLowerCase().includes(filter.toLowerCase());
                    const matchDesc = tool.desc.toLowerCase().includes(filter.toLowerCase());
                    return matchName || matchDesc;
                });

                if (filteredTools.length > 0) {
                    hasResults = true;
                    const categoryEl = document.createElement('div');
                    categoryEl.className = `category ${data.class}`;

                    let categoryHTML = `
                        <div class="category-header">
                            <span class="category-icon">${data.icon}</span>
                            <span>${categoryName}</span>
                            <span class="category-count">${filteredTools.length}</span>
                        </div>
                        <div class="tools-list">
                    `;

                    filteredTools.forEach(tool => {
                        categoryHTML += `
                            <div class="tool-item tool-name">${tool.name}</div>
                            <div class="tool-item tool-desc">${tool.desc}</div>
                        `;
                    });

                    categoryHTML += '</div>';
                    categoryEl.innerHTML = categoryHTML;
                    container.appendChild(categoryEl);
                }
            });

            if (!hasResults) {
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.innerHTML = '❌ Niciun tool nu corespunde cautării. Încearcă alt cuvânt.';
                container.appendChild(noResults);
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCategories(e.target.value);
        });

        // Initial render
        renderCategories();

        // Calculate total tools
        let totalTools = 0;
        Object.values(categories).forEach(cat => {
            totalTools += cat.tools.length;
        });
        document.getElementById('totalTools').textContent = totalTools + '+';
    </script>
</body>
</html>
